<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Love Forever</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}


body{
    background:#000;
    overflow:hidden;
    height:100vh;
    font-family:Arial,sans-serif;
    perspective:1200px;
}


#heart{
    position:absolute;
    top:50%;
    left:50%;
    transform-style:preserve-3d;
    animation:pulse 2.2s infinite ease-in-out;
}


.word{

    position:absolute;

    color:#ff1717;

    font-size:17px;

    letter-spacing:2px;

    white-space:nowrap;


    text-shadow:
    0 0 5px #ff0000,
    0 0 15px #ff0000,
    0 0 30px #990000;


    transform-style:preserve-3d;

    animation:float 3s infinite alternate ease-in-out;

}



#yu{

    position:absolute;

    top:50%;
    left:50%;

    transform:translate(-50%,-50%);

    color:#ff2020;

    font-size:42px;

    font-weight:bold;

    letter-spacing:5px;


    text-shadow:

    0 0 10px red,
    0 0 25px red,
    0 0 50px #900;


    animation:yuGlow 2s infinite alternate;

    z-index:10;

}



@keyframes pulse{


0%,100%{

transform:
translate(-50%,-50%)
scale(1);

}


50%{

transform:
translate(-50%,-50%)
scale(1.12);

}

}




@keyframes float{


0%{

margin-top:-8px;

}


100%{

margin-top:8px;

}

}



@keyframes yuGlow{


from{

opacity:.7;

}


to{

opacity:1;

}

}


</style>

</head>


<body>


<div id="heart"></div>

<div id="yu">
yu
</div>



<script>


const heart=document.getElementById("heart");


const total=100;



for(let i=0;i<total;i++){


let t=(Math.PI*2/total)*i;



let x=
16*Math.pow(Math.sin(t),3);



let y=
13*Math.cos(t)
-5*Math.cos(2*t)
-2*Math.cos(3*t)
-Math.cos(4*t);



let word=document.createElement("div");


word.className="word";


word.innerHTML="I love you";



let depth=Math.sin(t)*120;



word.style.transform=
`
translate3d(
${x*18}px,
${-y*18}px,
${depth}px
)
rotateZ(${t}rad)
`;



word.style.animationDelay=
`${Math.random()*2}s`;



heart.appendChild(word);


}



</script>


</body>
</html>
