<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Love Forever</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}


body{
    background:#000;
    height:100vh;
    overflow:hidden;
    perspective:1000px;
    font-family:Arial,sans-serif;
}



#heart{

    position:absolute;

    top:50%;
    left:50%;

    transform:
    translate(-50%,-50%);

    transform-style:preserve-3d;

    animation:heartbeat 2s infinite ease-in-out;

}



.word{

    position:absolute;

    color:#ff1111;

    font-size:16px;

    letter-spacing:2px;

    white-space:nowrap;


    text-shadow:

    0 0 5px red,
    0 0 15px red,
    0 0 30px #990000;


    transform-style:preserve-3d;


    animation:shine 2s infinite alternate;

}



#yu{

    position:absolute;

    top:50%;
    left:50%;


    transform:
    translate(-50%,-50%);


    color:#ff2222;

    font-size:40px;

    font-weight:bold;

    letter-spacing:4px;


    text-shadow:

    0 0 10px red,
    0 0 25px red,
    0 0 50px darkred;


    animation:yuPulse 2s infinite;


}



@keyframes heartbeat{


0%,100%{

transform:
translate(-50%,-50%)
scale(1);

}


50%{

transform:
translate(-50%,-50%)
scale(1.12);

}


}



@keyframes shine{


from{

opacity:.65;

}


to{

opacity:1;

}


}



@keyframes yuPulse{


0%,100%{

opacity:.7;

transform:
translate(-50%,-50%)
scale(1);

}


50%{

opacity:1;

transform:
translate(-50%,-50%)
scale(1.15);

}


}


</style>


</head>


<body>


<div id="heart"></div>


<div id="yu">
yu
</div>



<script>


const heart=document.getElementById("heart");


const amount=100;



for(let i=0;i<amount;i++){


let t=(Math.PI*2/amount)*i;



let x=
16*Math.pow(Math.sin(t),3);



let y=
13*Math.cos(t)
-5*Math.cos(2*t)
-2*Math.cos(3*t)
-Math.cos(4*t);



let word=document.createElement("div");


word.className="word";


word.innerHTML="I love you";



let z=Math.sin(t)*80;



word.style.transform=
`
translate3d(
${x*17}px,
${-y*17}px,
${z}px
)
`;



word.style.animationDelay=
`${Math.random()*2}s`;



heart.appendChild(word);


}



</script>


</body>
</html>
