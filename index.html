<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Love Forever</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    overflow:hidden;
    height:100vh;
    perspective:1000px;
    font-family:Arial,sans-serif;
}


#scene{
    position:absolute;
    width:100%;
    height:100%;
    transform-style:preserve-3d;
}


#heart{
    position:absolute;
    top:50%;
    left:50%;
    transform-style:preserve-3d;
    animation:beat 2s infinite ease-in-out;
}


.word{
    position:absolute;
    color:#ff1010;
    font-size:16px;
    letter-spacing:2px;
    white-space:nowrap;

    text-shadow:
    0 0 5px red,
    0 0 15px red,
    0 0 30px #900;

    transform-style:preserve-3d;
}


#yu{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    
    color:#ff2222;
    font-size:45px;
    font-weight:bold;
    letter-spacing:5px;

    text-shadow:
    0 0 10px red,
    0 0 25px red,
    0 0 50px #900;

    animation:glow 2s infinite alternate;
    z-index:5;
}


@keyframes beat{

    0%,100%{
        transform:
        translate(-50%,-50%)
        scale(1)
        rotateX(10deg)
        rotateY(0deg);
    }

    50%{
        transform:
        translate(-50%,-50%)
        scale(1.15)
        rotateX(20deg)
        rotateY(180deg);
    }
}


@keyframes glow{

    from{
        opacity:.7;
        transform:
        translate(-50%,-50%)
        scale(1);
    }

    to{
        opacity:1;
        transform:
        translate(-50%,-50%)
        scale(1.15);
    }
}

</style>

</head>


<body>


<div id="scene">
    <div id="heart"></div>
</div>


<div id="yu">
yu
</div>



<script>

const heart=document.getElementById("heart");

const count=100;


for(let i=0;i<count;i++){

    let t=Math.PI*2*i/count;


    let x=
    16*Math.pow(Math.sin(t),3);


    let y=
    13*Math.cos(t)
    -5*Math.cos(2*t)
    -2*Math.cos(3*t)
    -Math.cos(4*t);


    let word=document.createElement("div");

    word.className="word";

    word.innerHTML="I love you";


    let z=Math.sin(t)*80;


    word.style.transform=
    `
    translate3d(
    ${x*15}px,
    ${-y*15}px,
    ${z}px
    )
    rotateZ(${t}rad)
    `;


    word.style.animation=
    `
    move ${4+Math.random()*4}s
    infinite alternate ease-in-out
    `;


    heart.appendChild(word);
}



let style=document.createElement("style");

style.innerHTML=`

@keyframes move{

0%{

margin-top:-10px;

filter:brightness(1);

}


100%{

margin-top:10px;

filter:brightness(1.8);

}

}

`;

document.head.appendChild(style);



</script>


</body>
</html>
